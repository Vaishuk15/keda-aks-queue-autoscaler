apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment

spec:
  replicas: 0

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: nginx

          env:
            - name: FormStorageConnection
              valueFrom:
                secretKeyRef:
                  name: azure-storage-secret
                  key: connection
